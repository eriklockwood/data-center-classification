# Pre-commit configuration for data-center-classification.
#
# This config is NOT auto-installed at scaffold time. To enable on your machine:
#
#     uv run pre-commit install
#
# After that, the hooks below run on every `git commit`. Disable on a single
# commit with `git commit --no-verify` (use sparingly).

repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.12
    hooks:
      - id: ruff-check
        args: [--fix]
      - id: ruff-format

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-added-large-files
        args: [--maxkb=1024]
